name: "Connect Publish (manual)"
on:
  workflow_dispatch:
    inputs:
      namespace:
        required: true
        type: string
      environment:
        description: "The environment to deploy to"
        required: true
        type: choice
        default: "production"
        options:
          - "production"
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
      environment:
        description: "The environment to deploy to"
        required: true
        type: string
        default: "production"

jobs:
  connect-publish:
    name: "Connect Publish: ${{ inputs.namespace }} [${{ inputs.environment }}]"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          extra-packages: |
            any::rsconnect
            any::cpp11
      - name: Generate manifest
        run: Rscript dev/generate_manifest.R

      - name: Upload manifest
        uses: actions/upload-artifact@v7
        with:
          name: manifest
          path: manifest.json

      - name: Publish Connect content
        uses: rstudio/actions/connect-publish@main
        env:
          CONNECT_ENV_SET_AZ_STORAGE_CONTAINER: ${{ secrets.AZ_STORAGE_CONTAINER }}
          CONNECT_ENV_SET_AZ_STORAGE_EP: ${{ secrets.AZ_STORAGE_EP }}
          CONNECT_ENV_SET_AZ_TABLE_EP: ${{ secrets.AZ_TABLE_EP }}
          CONNECT_ENV_SET_AZ_TABLE_NAME: ${{ secrets.AZ_TABLE_NAME }}

        with:
          url: ${{ secrets.RSCONNECT_URL }}
          api-key: ${{ secrets.RSCONNECT_API_KEY }}
          access-type: logged_in
          force: true
          dir: .:outputs
          namespace: nhp/${{ inputs.namespace }}
